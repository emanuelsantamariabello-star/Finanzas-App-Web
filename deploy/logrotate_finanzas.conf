## logrotate configuration example for Finanzas App
## Install under /etc/logrotate.d/finanzas_app (adjust paths and user)

/var/www/finanzas_app/logs/errors.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 640 www-data www-data
    sharedscripts
    postrotate
        # if using php-fpm, reload to recreate file descriptors (adjust service name)
        if systemctl is-active --quiet php8.0-fpm; then
            systemctl reload php8.0-fpm >/dev/null 2>&1 || true
        fi
    endscript
}
